<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Versa | Create Your Sanctuary</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              "on-surface-variant": "#adaaaa",
              "on-secondary-container": "#fff6f1",

              "tertiary": "#b8ffbb",

              "on-background": "#ffffff",

              "error": "#ff6e84",
              "surface": "#0e0e0e",

              "tertiary-dim": "#4bee74",
              "primary": "#f183ff",
              "on-secondary-fixed-variant": "#774400",
              "inverse-on-surface": "#565555",
              "primary-dim": "#e46df5",
              "secondary": "#ff9800",
              "on-surface": "#ffffff",
              "on-primary-container": "#41004c",
              "surface-container-low": "#131313",
              "secondary-fixed-dim": "#ffb467",
              "secondary-fixed": "#ffc791",
              "on-secondary": "#4a2800",
              "inverse-surface": "#fcf9f8",
              "on-tertiary-container": "#005d22",
              "primary-fixed": "#ea73fb",
              "surface-bright": "#2c2c2c",
              "on-secondary-fixed": "#4f2c00",
              "surface-dim": "#0e0e0e",
              "error-dim": "#d73357",
              "surface-container": "#1a1919",
              "outline": "#767575",
              "surface-container-highest": "#262626",
              "on-primary-fixed-variant": "#540062",
              "surface-container-high": "#201f1f",
              "on-tertiary-fixed-variant": "#006827",
              "error-container": "#a70138",
              "outline-variant": "#484847",
              "on-primary-fixed": "#010002",
              "on-primary": "#540062",
              "tertiary-fixed": "#5cfd80"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .glow-text {
            text-shadow: 0 0 20px rgba(241, 131, 255, 0.3);
        }
        .bg-mesh {
            background: radial-gradient(circle at 20% 30%, rgba(241, 131, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255, 152, 0, 0.08) 0%, transparent 50%);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary/30 selection:text-primary min-h-screen flex flex-col relative overflow-hidden">
<!-- Abstract Background Elements -->
<div class="absolute inset-0 z-0 bg-mesh pointer-events-none"></div>
<div class="absolute top-[-10%] right-[-5%] w-[600px] h-[600px] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[500px] h-[500px] bg-secondary/5 blur-[100px] rounded-full"></div>
<!-- Background Image Asset (Fluid Shapes/Intertwined Hands) -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none mix-blend-screen">
<img class="w-full h-full object-cover grayscale brightness-50" data-alt="abstract ethereal close-up of intertwined hands in soft-focus lighting with deep shadows and high-end editorial luxury aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBKy6LWwXHhBl32nucbnbCifQyNAOnIjk69TFL5R5S0mty08EFKLMpv5QeuQn_QpPVgvnNjLoIkazhwVInoN1OjJVcpzvvNiK4SDoNoY-azYaQES7-UfR_ohfBED9_YPeTylF23jHJto0BY0py_xFfVL9bO5LexfhgY6WRel60Ovs2ejV5QrajX22s-E0rPOsrTC2Am66ZWcZHKfbHZQaw1OmkuO_iRmMCf5ZyGOstYe7-bnPU-57F8Zwy9b7UZ53ipFYcCxI145r8"/>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-grow flex items-center justify-center p-6">
<div class="w-full max-w-[480px]">
<!-- Branding Header -->
<div class="text-center mb-10">
<img alt="Versa Logo" class="h-12 mx-auto mb-6 drop-shadow-2xl" data-alt="Versa brand logo with a sophisticated infinity-inspired shape in iridescent violet and soft white tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBD0VT1UYovlWGYaSrfsfbi_pUjIK093EyV-v7G-RFghKm1s7pcDibMVsM_BpC50SVoIMMHyrax6xaTkVxfmRN8SXmfgqUTtMLIauRxKqkkrb0NRXlG8cUW0bD1dLB5uEwgxJjR1oQWlj-Y2VuXYfiHrJoFBpeL9E2ut_uHFSh8zxhDTljyhitl6KE1tp7I2becu5rPc13UybEG4lse0RbaiUkIuETlC7MNR5Jkmm3HpWMDVYV0dIQMkEuJRRzqhH4rt3XGfM54XmY"/>
</div>
<!-- Registration Card (Glassmorphism) -->
<div class="bg-surface-container-low/80 backdrop-blur-2xl rounded-[2.75rem] p-10 md:p-12 shadow-2xl border border-outline-variant/10">
<div class="mb-10 text-center">
<h1 class="font-headline text-3xl md:text-4xl font-extrabold tracking-tight text-on-background mb-3 glow-text">
                        Create Your Sanctuary
                    </h1>
<p class="text-on-surface-variant font-medium tracking-wide">
                        Begin your journey to radiant well-being.
                    </p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-outline pl-1" for="email">Email Address</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/40 transition-all duration-300" id="email" placeholder="name@sanctuary.com" type="email"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline/30 group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-outline pl-1" for="password">Password</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/40 transition-all duration-300" id="password" placeholder="••••••••" type="password"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline/30 group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-outline pl-1" for="confirm-password">Confirm Password</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/40 transition-all duration-300" id="confirm-password" placeholder="••••••••" type="password"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline/30 group-focus-within:text-primary transition-colors" data-icon="verified_user">verified_user</span>
</div>
</div>
<!-- CTA Button -->
<div class="pt-4">
<button class="w-full bg-gradient-to-r from-secondary to-secondary-dim hover:to-primary text-on-secondary font-bold py-5 rounded-xl text-lg shadow-lg shadow-secondary/20 hover:shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2" type="submit">
<span>Sign Up</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Security Message -->
<div class="flex items-center justify-center gap-2 pt-2">
<span class="material-symbols-outlined text-tertiary-dim text-sm" data-icon="encrypted">encrypted</span>
<p class="text-xs text-on-tertiary-fixed-variant font-medium">Your connection is encrypted and safe.</p>
</div>
</form>
<!-- Redirect to Login -->
<div class="mt-8 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-on-surface-variant text-sm">
                        Already have an account? 
                        <a class="text-primary font-bold hover:text-primary-fixed ml-1 transition-colors" href="#">Sign In</a>
</p>
</div>
</div>
<!-- Secondary Footer Navigation -->
<nav class="mt-12 flex justify-center gap-8">
<a class="text-outline text-xs font-semibold hover:text-on-surface transition-colors tracking-widest uppercase" href="#">Privacy Policy</a>
<a class="text-outline text-xs font-semibold hover:text-on-surface transition-colors tracking-widest uppercase" href="#">Terms</a>
<a class="text-outline text-xs font-semibold hover:text-on-surface transition-colors tracking-widest uppercase" href="#">Support</a>
</nav>
</div>
</main>
<!-- Global Footer (Shared Component Guidance) -->
<footer class="w-full py-12 border-t border-[#484847]/20 z-10 bg-[#0e0e0e]">
<div class="flex flex-col md:flex-row justify-between items-center px-12 max-w-7xl mx-auto gap-6">
<div class="text-lg font-bold text-[#fcf9f8] font-headline tracking-tighter">Versa</div>
<p class="font-['Plus_Jakarta_Sans'] text-sm tracking-wide text-[#767575] text-center md:text-left">
                © 2024 Versa. All rights reserved. Your Radiant Sanctuary.
            </p>
<div class="flex gap-6">
<span class="material-symbols-outlined text-[#767575] cursor-pointer hover:text-[#b8ffbb] transition-colors" data-icon="share">share</span>
<span class="material-symbols-outlined text-[#767575] cursor-pointer hover:text-[#b8ffbb] transition-colors" data-icon="language">language</span>
<span class="material-symbols-outlined text-[#767575] cursor-pointer hover:text-[#b8ffbb] transition-colors" data-icon="eco">eco</span>
</div>
</div>
</footer>
</body></html>
