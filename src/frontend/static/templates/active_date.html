<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Versa - Active Date Night</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#0e0e0e] text-white font-body selection:bg-primary/30 min-h-screen overflow-hidden">
<header class="fixed top-0 z-50 w-full px-6 py-4 flex justify-between items-center bg-transparent backdrop-blur-xl">
<div class="flex items-center gap-2">
<span class="text-2xl font-bold tracking-tighter text-[#f183ff] font-headline">Versa</span>
</div>
<button class="px-6 py-2 rounded-full bg-[#201f1f] border border-white/10 text-white text-sm font-semibold">Pause</button>
</header>
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-6 pt-24 pb-32 max-w-lg mx-auto text-center">
<div class="mb-12">
<h2 class="text-gray-500 text-sm uppercase tracking-widest mb-4">Current Practice</h2>
<p class="text-2xl font-medium leading-relaxed">Gently massage your partner's shoulders, focusing on slow, rhythmic movements.</p>
</div>
<div class="relative flex items-center justify-center w-72 h-72 mb-16 border-2 border-[#f183ff]/20 rounded-full">
<div class="flex flex-col items-center">
<span class="text-7xl font-extrabold tracking-tighter text-white">12:45</span>
<span class="text-gray-500 font-semibold tracking-widest uppercase text-[10px] mt-2">Remaining</span>
</div>
</div>
<button class="group relative flex flex-col items-center justify-center w-32 h-32 rounded-full bg-red-900 transition-all duration-300 active:scale-95 shadow-[0_0_40px_rgba(215,51,87,0.4)]">
<span class="material-symbols-outlined text-4xl mb-1">front_hand</span>
<span class="font-extrabold text-sm tracking-widest">STOP</span>
</button>
</main>
</body></html>
