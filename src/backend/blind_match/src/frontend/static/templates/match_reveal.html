<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Versa - Match Reveal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#0e0e0e] text-white font-body min-h-screen">
<header class="flex justify-between items-center w-full px-6 py-6 fixed top-0 z-50 bg-transparent backdrop-blur-xl">
<div class="flex items-center gap-3">
<img alt="Versa App Logo" class="w-10 h-10 rounded-xl" src="/static/img/versa_logo.png"/>
<span class="text-2xl font-bold tracking-tighter text-[#f183ff] font-headline">Versa</span>
</div>
</header>
<main class="relative pt-24 pb-32 px-6 max-w-2xl mx-auto">
<section class="mb-12">
<div class="text-center">
<div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-green-500/10 text-green-400 mb-6 border border-green-500/20">
<span class="material-symbols-outlined text-[18px]">favorite</span>
<span class="text-[10px] font-bold tracking-[0.2em] uppercase">Symmetry Found</span>
</div>
<h1 class="text-5xl font-extrabold font-headline tracking-tight text-white mb-4">
                        Your <br/>Overlapping <br/><span class="text-[#f183ff]">Desires</span>
</h1>
</div>
</section>
<section class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-12">
<div class="md:col-span-2 bg-[#1a1919] p-8 rounded-3xl border border-white/5 flex items-center justify-between">
<div>
<span class="text-[#ff9800] font-bold text-[11px] tracking-widest uppercase">Deep Connection</span>
<h3 class="text-2xl font-headline font-bold text-white">Deep Conversation</h3>
</div>
<span class="material-symbols-outlined text-3xl text-[#ff9800]">forum</span>
</div>
</section>
</main>
<div class="fixed bottom-0 left-0 w-full p-8 z-50">
<button class="w-full bg-gradient-to-r from-[#ff9800] to-[#ec8c00] text-black py-5 rounded-3xl font-bold text-lg">
                Start Date Night
</button>
</div>
</body></html>
