<style>
        /* Custom styles for sliders and glows */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #f183ff; /* primary */
            cursor: pointer;
            box-shadow: 0 0 15px rgba(241, 131, 255, 0.6);
            transition: box-shadow 0.2s ease, transform 0.1s ease;
        }
        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(241, 131, 255, 0.8);
        }
        input[type=range]::-moz-range-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #f183ff;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(241, 131, 255, 0.6);
            border: none;
        }
        input[type=range]::-moz-range-thumb:active {
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(241, 131, 255, 0.8);
        }
        input[type=range] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }
        .chip-glow.active {
            box-shadow: 0 0 15px rgba(228, 109, 245, 0.4); /* primary-dim */
            background-color: theme('colors.primary-dim');
            color: theme('colors.on-primary');
        }
        .segment-active {
            background-color: theme('colors.secondary-container');
            color: theme('colors.on-secondary-container');
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.3);
        }

<script>
        // Simple script for basic interactions
        document.querySelectorAll('.chip-glow').forEach(chip => {
            chip.addEventListener('click', () => {
                chip.classList.toggle('active');
                if (chip.classList.contains('active')) {
                    chip.classList.remove('text-on-surface-variant');
                } else {
                    chip.classList.add('text-on-surface-variant');
                }
            });
        });

        const segments = document.querySelectorAll('.bg-surface-container-lowest button');
        segments.forEach(btn => {
            btn.addEventListener('click', () => {
                segments.forEach(b => {
                    b.classList.remove('segment-active');
                    b.classList.add('text-on-surface-variant');
                });
                btn.classList.add('segment-active');
                btn.classList.remove('text-on-surface-variant');
            });
        });

        // Basic slider background fill logic (visual only)
        const sliders = document.querySelectorAll('input[type="range"]');
        sliders.forEach(slider => {
            slider.addEventListener('input', function() {
                const value = (this.value - this.min) / (this.max - this.min) * 100;
                this.style.background = `linear-gradient(to right, #f183ff 0%, #f183ff ${value}%, rgba(255,255,255,0.1) ${value}%, rgba(255,255,255,0.1) 100%)`;
            });
            // trigger on load
            slider.dispatchEvent(new Event('input'));
        });
    </script>
