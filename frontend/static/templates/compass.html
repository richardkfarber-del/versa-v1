<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Versa - Connection Compass</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#0e0e0e] text-white font-body overflow-hidden relative min-h-screen">
<header class="relative z-50 flex justify-between items-center w-full px-6 py-8">
<div class="flex items-center gap-4">
<img src="/assets/logo.png" alt="Versa Logo" class="h-10 w-auto object-contain mix-blend-screen" style="filter: brightness(1.2);" />
<span class="text-2xl font-bold tracking-tighter text-[#f183ff] font-headline">Versa</span>
</div>
</header>
<main class="relative z-10 max-w-2xl mx-auto px-6 pt-4 pb-24 flex flex-col items-center justify-center text-center">
<div class="mb-16 space-y-6">
<h1 class="font-headline text-4xl md:text-5xl font-extrabold tracking-tight leading-tight">
                I'm interested in trying a <span class="text-[#ff9800]">massage</span> with my partner.
            </h1>
<p class="text-gray-400 text-lg max-w-md mx-auto leading-relaxed">
                Be honest with yourself—there are no wrong answers in your sanctuary.
            </p>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
<button class="group relative flex flex-col items-center justify-center p-8 rounded-[40px] bg-[#131313] hover:bg-green-500/10 transition-all duration-300 border border-white/5">
<span class="material-symbols-outlined text-green-400 text-4xl mb-4">check_circle</span>
<span class="font-bold text-xl text-green-400">Yes</span>
</button>
<button class="group relative flex flex-col items-center justify-center p-8 rounded-[40px] bg-[#131313] hover:bg-[#ff9800]/10 transition-all duration-300 border border-white/5">
<span class="material-symbols-outlined text-[#ff9800] text-4xl mb-4">question_mark</span>
<span class="font-bold text-xl text-[#ff9800]">Maybe</span>
</button>
<button class="group relative flex flex-col items-center justify-center p-8 rounded-[40px] bg-[#131313] hover:bg-[#f183ff]/10 transition-all duration-300 border border-white/5">
<span class="material-symbols-outlined text-[#f183ff] text-4xl mb-4">cancel</span>
<span class="font-bold text-xl text-[#f183ff]">No</span>
</button>
</div>
</main>
<footer class="fixed bottom-0 left-0 w-full p-8 flex justify-center z-50">
<div class="flex gap-4 items-center">
<span class="material-symbols-outlined text-gray-600 text-sm">lock</span>
<span class="text-gray-500 font-label text-xs tracking-wider uppercase">Your responses are private and encrypted</span>
</div>
</footer>
</body></html>
