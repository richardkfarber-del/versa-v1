<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Versa - Grounding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "tertiary-fixed": "#5cfd80",
            "surface-variant": "#262626",
            "on-error": "#490013",
            "on-secondary-fixed-variant": "#774400",
            "on-error-container": "#ffb2b9",
            "error-dim": "#d73357",
            "on-secondary-fixed": "#4f2c00",

            "surface-tint": "#f183ff",
            "tertiary-fixed-dim": "#4bee74",
            "on-tertiary-fixed": "#004819",
            "inverse-on-surface": "#565555",
            "on-tertiary-fixed-variant": "#006827",
            "secondary-container": "#8b5000",
            "primary-container": "#e770f8",
            "primary": "#f183ff",
            "surface-container-highest": "#262626",
            "secondary-dim": "#ec8c00",
            "on-surface": "#ffffff",
            "outline": "#767575",
            "outline-variant": "#484847",
            "inverse-primary": "#9b26af",
            "inverse-surface": "#fcf9f8",
            "surface-container": "#1a1919",
            "surface-container-high": "#201f1f",
            "surface": "#0e0e0e",
            "tertiary-container": "#5cfd80",
            "tertiary": "#b8ffbb",
            "on-background": "#ffffff",
            "on-tertiary": "#006727",
            "primary-dim": "#e46df5",
            "surface-dim": "#0e0e0e",
            "secondary": "#ff9800",
            "surface-container-lowest": "#000000",
            "on-secondary": "#4a2800",
            "secondary-fixed": "#ffc791",
            "primary-fixed-dim": "#db65ec",
            "on-secondary-container": "#fff6f1",
            "secondary-fixed-dim": "#ffb467",
            "on-tertiary-container": "#005d22",
            "on-primary": "#540062",
            "error-container": "#a70138",
            "on-primary-container": "#41004c",
            "primary-fixed": "#ea73fb",
            "error": "#ff6e84",
            "surface-bright": "#2c2c2c",
            "tertiary-dim": "#4bee74",
            "on-surface-variant": "#adaaaa",
            "background": "#0e0e0e",

            "on-primary-fixed": "#010002"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Plus Jakarta Sans"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
        },
      },
    }

<style>
    .breath-circle {
      transition: transform 4s ease-in-out;
    }
    .blur-glow {
      filter: blur(80px);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-tertiary/30 overflow-hidden h-screen w-screen flex flex-col">
<!-- Suppression of navigation shells as per the "Destination" Rule for focus-mode/transactional screens -->
<!-- Top Bar: Minimalism and Calm -->
<header class="bg-transparent backdrop-blur-xl bg-opacity-80 dark:bg-[#0e0e0e]/80 docked full-width top-0 z-50 flex justify-between items-center w-full px-6 py-8">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="spa">spa</span>
<span class="text-2xl font-bold tracking-tighter text-[#f183ff] dark:text-[#f183ff]">Versa</span>
</div>
<div class="flex items-center">
<div class="h-1.5 w-1.5 rounded-full bg-tertiary animate-pulse mr-2"></div>
<span class="text-[10px] font-semibold uppercase tracking-[0.2em] text-on-surface-variant">Grounding</span>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center relative px-8">
<!-- Ambient Background Texture -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-tertiary/10 rounded-full blur-glow opacity-30"></div>
<div class="absolute top-1/4 left-1/3 w-[300px] h-[300px] bg-primary/5 rounded-full blur-glow opacity-20"></div>
</div>
<!-- Central Breath Pacer -->
<div class="relative z-10 flex flex-col items-center">
<div class="relative flex items-center justify-center">
<!-- Outer soft glow -->
<div class="absolute w-80 h-80 rounded-full bg-tertiary/5 border border-tertiary/20 scale-110"></div>
<!-- Main breathing element -->
<div class="w-64 h-64 rounded-full border-[0.5px] border-tertiary/40 flex items-center justify-center relative shadow-[0_0_60px_rgba(184,255,187,0.15)]">
<div class="w-48 h-48 rounded-full bg-gradient-to-br from-tertiary/30 to-tertiary/10 backdrop-blur-md"></div>
<div class="absolute inset-0 flex items-center justify-center">
<span class="text-on-surface font-headline text-3xl font-light tracking-widest uppercase opacity-80">Inhale</span>
</div>
</div>
</div>
<!-- Instruction Sequence -->
<div class="mt-24 text-center space-y-6 max-w-xs">
<div class="flex flex-col gap-2">
<h1 class="text-on-surface font-headline text-4xl font-extrabold tracking-tight">Pause</h1>
<p class="text-on-surface-variant text-lg font-medium leading-relaxed">
            You are safe. Take all the time you need.
          </p>
</div>
<!-- Breathing steps -->
<div class="flex justify-center items-center gap-4 py-8">
<div class="px-4 py-1.5 rounded-full bg-tertiary text-on-tertiary text-xs font-bold uppercase tracking-widest">Inhale</div>
<div class="w-1.5 h-1.5 rounded-full bg-surface-container-highest"></div>
<div class="text-on-surface-variant text-xs font-semibold uppercase tracking-widest">Hold</div>
<div class="w-1.5 h-1.5 rounded-full bg-surface-container-highest"></div>
<div class="text-on-surface-variant text-xs font-semibold uppercase tracking-widest">Exhale</div>
</div>
</div>
</div>
</main>
<!-- Bottom CTA: Return with Intention -->
<footer class="p-12 flex flex-col items-center relative z-20">
<button class="group flex flex-col items-center gap-4 transition-transform duration-300 hover:scale-105 active:scale-95">
<div class="bg-surface-container-low p-6 rounded-full border border-outline-variant/20 shadow-xl group-hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-secondary text-4xl" data-icon="play_arrow" data-weight="fill">play_arrow</span>
</div>
<span class="font-label text-xs font-bold uppercase tracking-[0.3em] text-on-surface-variant group-hover:text-on-surface transition-colors">Resume when ready</span>
</button>
</footer>
<!-- Subtle Texture Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] bg-[url('https://www.transparenttextures.com/patterns/asfalt-dark.png')]"></div>
</body></html>
