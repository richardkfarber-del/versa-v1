<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versa - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
</head>
<body>
    <div class="container">
        <img src="company_logo.png" alt="Versa Logo" style="max-width: 140px; display: block; margin-bottom: 40px;">
        <h2>Welcome back</h2>
        <p class="subtitle">Enter your details to access your sanctuary.</p>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Log In</button>
        </form>
        
        <a href="register.html" class="footer-link">Don't have an account? <span>Sign up</span></a>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    if (result.token) localStorage.setItem('token', result.token);
                    alert('Login successful!');
                    window.location.href = 'index.html';
                } else {
                    alert('Login failed: ' + (result.message || result.error || 'Invalid credentials'));
                }
            } catch (err) {
                console.error('Error:', err);
                alert('Error connecting to the server.');
            }
        });
    </script>
</body>
</html>
