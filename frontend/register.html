<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versa - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-midnight: #0e0e0e;
            --surface-container-low: #131313;
            --surface-container-lowest: #000000;
            --surface-container-high: #201f1f;
            --primary-plum: #f183ff;
            --secondary-saffron: #ff9800;
            --ghost-border: rgba(72, 72, 71, 0.2);
            --font-headline: 'Manrope', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --spacing-form: 2.75rem;
            --radius-button: 1.5rem;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-midnight);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(241, 131, 255, 0.15), transparent 50%),
                              radial-gradient(circle at bottom left, rgba(255, 152, 0, 0.1), transparent 50%);
        }
        .container {
            background: rgba(19, 19, 19, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 48px;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            box-sizing: border-box;
            margin: 20px 0;
        }
        h2 {
            font-family: var(--font-headline);
            color: #ffffff;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 2.5rem;
            letter-spacing: -0.02em;
        }
        p.subtitle {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            font-size: 1rem;
        }
        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
            font-size: 1rem;
        }
        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 16px;
            background: var(--surface-container-lowest);
            border: 1px solid var(--ghost-border);
            border-radius: 16px;
            color: #ffffff;
            box-sizing: border-box;
            font-size: 1rem;
            font-family: var(--font-body);
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            background: var(--surface-container-high);
            border-color: rgba(241, 131, 255, 0.5);
            box-shadow: 0 0 15px rgba(241, 131, 255, 0.1);
        }
        button {
            width: 100%;
            padding: 16px;
            margin-top: 16px;
            background: linear-gradient(135deg, #f183ff, #e770f8);
            color: #000000;
            border: none;
            border-radius: var(--radius-button);
            font-size: 1.125rem;
            font-weight: 700;
            font-family: var(--font-body);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 10px 20px rgba(241, 131, 255, 0.2);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(241, 131, 255, 0.3);
        }
        .footer-link {
            display: block;
            text-align: center;
            margin-top: 32px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }
        .footer-link:hover {
            color: var(--secondary-saffron);
        }
        .footer-link span {
            color: var(--secondary-saffron);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="company_logo.png" alt="Versa Logo" style="max-width: 140px; display: block; margin-bottom: 40px;">
        <h2>Create account</h2>
        <p class="subtitle">Join the Radiant Sanctuary.</p>
        
        <form id="register-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="E.g., Jamie Doe" required>
            </div>
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Sign Up</button>
        </form>
        
        <a href="login.html" class="footer-link">Already have an account? <span>Log in</span></a>
    </div>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    if (result.token) localStorage.setItem('token', result.token);
                    alert('Registration successful!');
                    window.location.href = 'login.html';
                } else {
                    alert('Registration failed: ' + (result.message || result.error || 'Unknown error'));
                }
            } catch (err) {
                console.error('Error:', err);
                alert('Error connecting to the server.');
            }
        });
    </script>
</body>
</html>
