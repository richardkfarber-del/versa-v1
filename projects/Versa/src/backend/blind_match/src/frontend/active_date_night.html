<div class="flex items-center gap-4">

<span class="text-2xl font-bold tracking-tighter text-[#f183ff] dark:text-[#f183ff] font-headline">Versa</span>
</div>
</div>
<button class="px-6 py-2 rounded-full bg-surface-container-high border border-outline/20 text-on-surface text-sm font-semibold tracking-wide hover:opacity-80 transition-opacity">

<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-6 pt-24 pb-32 max-w-lg mx-auto">
<!-- Instructional Header -->
<div class="text-center mb-12">
<h2 class="font-headline text-on-surface-variant text-sm uppercase tracking-[0.2em] mb-4">Current Practice</h2>
<p class="text-2xl font-medium leading-relaxed font-body">
                Gently massage your partner's shoulders, focusing on slow, rhythmic movements.
            </p>
</div>
<!-- Central Timer Component -->
<div class="relative flex items-center justify-center w-72 h-72 mb-16">
<!-- Decorative Glow Rings -->
<div class="absolute inset-0 rounded-full border border-primary/10 animate-pulse"></div>
<div class="absolute inset-4 rounded-full border border-secondary/20 glow-border"></div>
<!-- Timer Display -->
<div class="flex flex-col items-center">
<span class="font-headline text-7xl font-extrabold tracking-tighter text-on-surface drop-shadow-2xl">12:45</span>
<span class="text-tertiary font-semibold tracking-[0.3em] uppercase text-[10px] mt-2">Remaining</span>
</div>
<!-- Soft Focus Ambient Circles (Decorative) -->
<div class="absolute -z-10 w-full h-full bg-primary/5 rounded-full blur-3xl"></div>
</div>
<!-- Progress Indicator -->
<div class="w-full h-1 bg-surface-container-highest rounded-full mb-12 overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-secondary w-1/3 rounded-full"></div>
</div>
<!-- Trauma-Informed Action Center -->
<div class="w-full flex flex-col items-center gap-8">
<!-- Large Emergency Brake -->
<button class="group relative flex flex-col items-center justify-center w-32 h-32 rounded-full transition-all duration-300 active:scale-95">
<div class="absolute inset-0 bg-error-dim rounded-full shadow-[0_0_40px_rgba(215,51,87,0.4)] transition-all group-hover:shadow-[0_0_60px_rgba(215,51,87,0.6)]"></div>
<div class="relative flex flex-col items-center text-on-error">
<span class="material-symbols-outlined text-4xl mb-1" data-icon="front_hand" style="font-variation-settings: 'FILL' 1;">front_hand</span>
<span class="font-headline font-extrabold text-sm tracking-widest">STOP</span>
</div>
</button>
<p class="text-on-surface-variant text-xs font-medium text-center max-w-[240px] leading-relaxed opacity-60">
                Tap STOP at any time to immediately end the session. Your comfort is our priority.
            </p>
</div>
</main>
<!-- Bottom Interface (Relevance Check: Suppressed standard nav for focus) -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 flex items-center gap-6">
<button class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface hover:bg-surface-container-highest transition-colors">
